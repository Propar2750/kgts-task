name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[test]"
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build the image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: order-chaos:ci

      - name: Smoke-test the running container
        run: |
          docker run -d --name oc -p 8000:8000 order-chaos:ci
          # wait for the server to come up
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/healthz >/dev/null; then ok=1; break; fi
            sleep 2
          done
          if [ -z "$ok" ]; then echo "healthz never responded"; docker logs oc; exit 1; fi

          echo "healthz OK"
          curl -fsS http://localhost:8000/ | grep -q 'id="root"' && echo "static index OK"
          curl -fsS -X POST http://localhost:8000/api/match/new | grep -q '"current_round"' && echo "API OK"
          docker rm -f oc
